<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三橋｜Mitsuwol</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500&family=Zen+Kaku+Gothic+New:wght@300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #070707;
    color: #EAE7E0;
    font-family: "Zen Kaku Gothic New", "Hiragino Kaku Gothic ProN", sans-serif;
    font-weight: 300;
    display: grid;
    place-items: center;
    -webkit-font-smoothing: antialiased;
  }
  .gate {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
    opacity: 0;
    animation: fadein 1.8s ease 0.3s forwards;
  }
  @keyframes fadein { to { opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { .gate { animation: none; opacity: 1; } }

  .g-name {
    font-family: "Shippori Mincho", "Hiragino Mincho ProN", serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.9em;
    text-indent: 0.9em; /* 中央揃えの視覚補正 */
    color: #EAE7E0;
  }
  .g-en {
    margin-top: 14px;
    font-size: 9px;
    letter-spacing: 0.6em;
    text-indent: 0.6em;
    color: #797670;
    text-transform: uppercase;
  }
  form { margin-top: 64px; }
  .g-input {
    width: 200px;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(234, 231, 224, 0.22);
    color: #EAE7E0;
    font-family: inherit;
    font-weight: 300;
    font-size: 14px;
    letter-spacing: 0.3em;
    text-align: center;
    padding: 8px 4px;
    outline: none;
    transition: border-color 0.5s;
    border-radius: 0;
  }
  .g-input:focus { border-bottom-color: rgba(234, 231, 224, 0.55); }
  .g-input::placeholder { color: #55534E; letter-spacing: 0.4em; }
  .g-msg {
    margin-top: 18px;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: #C7402D;
    min-height: 16px;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .g-msg.on { opacity: 1; }
  .gate.deny .g-input { border-bottom-color: rgba(199, 64, 45, 0.7); animation: shake 0.4s; }
  @keyframes shake {
    25% { transform: translateX(-4px); } 50% { transform: translateX(4px); } 75% { transform: translateX(-2px); }
  }
  body.open { animation: fadeout 0.9s ease forwards; }
  @keyframes fadeout { to { opacity: 0; } }
  #dust { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .gate { position: relative; z-index: 1; }
</style>
</head>
<body>
  <canvas id="dust" aria-hidden="true"></canvas>
  <div class="gate" id="gate">
    <p class="g-name">三橋</p>
    <p class="g-en">Mitsuwol</p>
    <form id="form" autocomplete="off">
      <input class="g-input" id="pass" type="password" placeholder="合言葉" aria-label="合言葉" autofocus>
      <p class="g-msg" id="msg">合言葉が違います</p>
    </form>
  </div>

<script>
const PAYLOAD = "__PAYLOAD__";

const b64 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));

async function decrypt(passphrase) {
  const data = b64(PAYLOAD);
  const salt = data.slice(0, 16);
  const iv = data.slice(16, 28);
  const body = data.slice(28);
  const keyMaterial = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 200000, hash: "SHA-256" },
    keyMaterial, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, body);
  return new TextDecoder().decode(plain);
}

async function tryOpen(passphrase, remember) {
  const html = await decrypt(passphrase); // 失敗時は例外
  if (remember) sessionStorage.setItem("aikotoba", passphrase);
  document.body.classList.add("open");
  setTimeout(() => { document.open(); document.write(html); document.close(); }, 650);
}

const form = document.getElementById("form");
const input = document.getElementById("pass");
const msg = document.getElementById("msg");
const gate = document.getElementById("gate");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const v = input.value.trim();
  if (!v) return;
  try {
    await tryOpen(v, true);
  } catch {
    gate.classList.remove("deny");
    void gate.offsetWidth; /* アニメーション再生のためのリフロー */
    gate.classList.add("deny");
    msg.classList.add("on");
    input.select();
  }
});

/* 同一タブ内の再訪はゲートを省略 */
const saved = sessionStorage.getItem("aikotoba");
if (saved) tryOpen(saved, false).catch(() => sessionStorage.removeItem("aikotoba"));

/* 蒔絵の銀砂 — 黒漆の上を漂う微細な粒子 */
(() => {
  const canvas = document.getElementById("dust");
  const ctx = canvas.getContext("2d");
  const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
  let W, H, dpr, dots = [];

  function setup() {
    dpr = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + "px"; canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const n = Math.round((W * H) / 16000);
    dots = Array.from({ length: n }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 0.4 + Math.random() * 1.1,
      vx: (Math.random() - 0.5) * 0.12,
      vy: -0.02 - Math.random() * 0.1,
      ph: Math.random() * Math.PI * 2,
      tw: 0.004 + Math.random() * 0.01,
      shu: Math.random() < 0.03,
    }));
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    for (const d of dots) {
      const a = 0.08 + 0.3 * (0.5 + 0.5 * Math.sin(d.ph + t * d.tw));
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = d.shu ? `rgba(199,64,45,${a})` : `rgba(234,231,224,${a * 0.9})`;
      ctx.fill();
      d.x += d.vx + Math.sin(d.ph + t * 0.0004) * 0.05;
      d.y += d.vy;
      if (d.y < -4) { d.y = H + 4; d.x = Math.random() * W; }
      if (d.x < -4) d.x = W + 4; else if (d.x > W + 4) d.x = -4;
    }
  }

  let raf;
  function loop(t) { draw(t); raf = requestAnimationFrame(loop); }
  setup();
  if (reduced) { draw(0); }
  else {
    raf = requestAnimationFrame(loop);
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) cancelAnimationFrame(raf);
      else raf = requestAnimationFrame(loop);
    });
  }
  addEventListener("resize", () => { setup(); if (reduced) draw(0); });
})();
</script>
</body>
</html>
